<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#08080a"/>
  <rect width="472" height="472" x="20" y="20" rx="108" fill="none" stroke="url(#glow)" stroke-width="4" stroke-opacity="0.3"/>
  
  <!-- Glowing Waveform / Mic Icon -->
  <g filter="url(#shadow)" transform="translate(128, 128)">
    <rect x="80" y="32" width="96" height="160" rx="48" fill="url(#glow)" />
    <path d="M 48 112 A 80 80 0 0 0 208 112" fill="none" stroke="url(#glow)" stroke-width="20" stroke-linecap="round" />
    <line x1="128" y1="192" x2="128" y2="232" stroke="url(#glow)" stroke-width="20" stroke-linecap="round" />
  </g>
</svg>
